name: Android Build

on:
  push:
    paths-ignore:
      - '**.md'
    tags:
      - '[0-9]*'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Generate Config.kt
        env:
          API_KEY: ${{ secrets.GOLF_COURSE_API_KEY }}
        run: |
          mkdir -p app/src/main/java/io/github/nicechester/gobirdie
          cat > app/src/main/java/io/github/nicechester/gobirdie/Config.kt << EOF
          package io.github.nicechester.gobirdie

          object Config {
              const val GOLF_COURSE_API_KEY = "${API_KEY}"
          }
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gobirdie-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Build release AAB
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew bundleRelease --no-daemon

      - name: Sign release AAB
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/release/*.aab
