name: Android Build

on:
  push:
    tags:
      - '[0-9]*'
    branches:
      - '**'
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Generate Config.kt
        env:
          API_KEY: ${{ secrets.GOLF_COURSE_API_KEY }}
        run: |
          mkdir -p app/src/main/java/io/github/nicechester/gobirdie
          cat > app/src/main/java/io/github/nicechester/gobirdie/Config.kt << EOF
          package io.github.nicechester.gobirdie

          object Config {
              const val GOLF_COURSE_API_KEY = "${API_KEY}"
          }
          EOF

      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APKs
        run: ./gradlew :app:assembleDebug :wear:assembleDebug --no-daemon

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: gobirdie-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            wear/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Build release APKs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :wear:assembleRelease --no-daemon

      - name: Rename release APKs
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/GoBirdie-${{ github.ref_name }}.apk
          mv wear/build/outputs/apk/release/wear-release.apk wear/build/outputs/apk/release/GoBirdie-Wear-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/GoBirdie-*.apk
            wear/build/outputs/apk/release/GoBirdie-Wear-*.apk
